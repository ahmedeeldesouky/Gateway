<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIE LUXOR | AI Blue Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.95);
            --danger-red: #ff4d4d;
            --safe-green: #2ecc71;
            --info-blue: #1e90ff;
            /* توحيد الإنارة المخفية للون الأزرق الخافت */
            --neon-blue-glow: rgba(30, 144, 255, 0.2); 
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0; padding: 20px;
        }

        /* الهيدر بإنارة زرقاء مخفية وحجم لوجو صغير */
        .header {
            background: var(--card-bg); padding: 15px 25px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05), inset 0 0 15px var(--neon-blue-glow);
            margin-bottom: 25px; border: 1px solid rgba(30, 144, 255, 0.15);
            position: relative; transition: 0.4s ease;
        }
        
        .header:hover { transform: translateY(-5px); }

        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-box img { width: 45px; height: auto; border-radius: 8px; }

        /* شبكة الكروت العائمة بإنارة زرقاء */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--card-bg); padding: 22px 12px; border-radius: 22px;
            text-align: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), inset 0 0 15px var(--neon-blue-glow);
            border: 1px solid rgba(30, 144, 255, 0.1);
            position: relative;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(30, 144, 255, 0.1); }
        .card i { font-size: 26px; margin-bottom: 10px; color: var(--info-blue); }
        .card .label { font-size: 10px; font-weight: 700; color: #636e72; text-transform: uppercase; }
        .card .value { font-size: 22px; font-weight: 800; margin-top: 8px; color: #2d3436; }

        /* حالة الخطر (تغيير اللون بالكامل) */
        .card.status-danger { background-color: var(--danger-red) !important; color: white !important; animation: alarm 1.5s infinite; border: none; }
        .card.status-danger i, .card.status-danger .label, .card.status-danger .value { color: white !important; }

        @keyframes alarm { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* أزرار التحكم بإنارة زرقاء مخفية */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .control-btn {
            background: var(--card-bg); border-radius: 25px; padding: 30px;
            border: 1px solid rgba(30, 144, 255, 0.1); cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), inset 0 0 20px var(--neon-blue-glow);
            display: flex; flex-direction: column; align-items: center;
        }
        
        .control-btn i { font-size: 40px; margin-bottom: 12px; color: #dfe6e9; transition: 0.4s; }
        
        .active-fan i { color: var(--safe-green) !important; animation: spin 2s linear infinite; filter: drop-shadow(0 0 10px var(--safe-green)); }
        .active-light i { color: #f1c40f !important; filter: drop-shadow(0 0 15px #f1c40f); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #clock { font-family: monospace; font-size: 20px; font-weight: bold; color: #2d3436; }
    </style>
</head>

        <div>
            <h2 style="margin:0; font-size: 16px;">HIGHER INSTITUTE OF ENGINEERING</h2>
            <small style="color: var(--info-blue); font-weight: bold; letter-spacing: 0.5px;">AI COMMAND CENTER | LUXOR</small>
        </div>
    </div>
    <div id="clock">00:00:00</div>
</div>

<div class="stats-grid">
    <div class="card" id="temp-card">
        <i class="fas fa-thermometer-half"></i>
        <div class="label">Temperature</div>
        <div class="value" id="temp-val">--°C</div>
    </div>
    <div class="card" id="humi-card">
        <i class="fas fa-tint"></i>
        <div class="label">Humidity</div>
        <div class="value" id="humi-val">--%</div>
    </div>
    <div class="card" id="smoke-card">
        <i class="fas fa-wind"></i>
        <div class="label">Smoke Sensor</div>
        <div class="value" id="smoke-val">STABLE</div>
    </div>
    <div class="card" id="fire-card">
        <i class="fas fa-fire"></i>
        <div class="label">Fire Guard</div>
        <div class="value" id="fire-val">SECURE</div>
    </div>
    <div class="card" id="ping-card">
        <i class="fas fa-bolt"></i>
        <div class="label">System Ping</div>
        <div class="value" id="ping-val">-- ms</div>
    </div>
</div>

<div class="control-grid">
    <button class="control-btn" id="fan-btn" onclick="toggleDevice('fan')">
        <i class="fas fa-fan"></i>
        <span style="font-weight: 800; color: #636e72;">EXHAUST SYSTEM</span>
    </button>
    <button class="control-btn" id="light-btn" onclick="toggleDevice('light')">
        <i class="fas fa-lightbulb"></i>
        <span style="font-weight: 800; color: #636e72;">LAB LIGHTING</span>
    </button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://gateway-bfc0e-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    database.ref('lab_sensors').on('value', (snap) => {
        const data = snap.val();
        if(!data) return;

        document.getElementById('temp-val').innerText = (data.temperature || data.temp) + "°C";
        document.getElementById('humi-val').innerText = (data.humidity || 0) + "%";
        document.getElementById('ping-val').innerText = (data.ping || "0").toString().replace('ms','') + " ms";

        // Smoke/Fire Alert Logic
        const smokeCard = document.getElementById('smoke-card');
        const fireCard = document.getElementById('fire-card');
        
        document.getElementById('smoke-val').innerText = data.smoke === "SMOKE DETECTED" ? "DANGER" : "STABLE";
        smokeCard.className = data.smoke === "SMOKE DETECTED" ? "card status-danger" : "card";

        document.getElementById('fire-val').innerText = (data.fire === "FIRE DETECTED" || data.fire === "ALERT") ? "ALERT" : "SECURE";
        fireCard.className = (data.fire === "FIRE DETECTED" || data.fire === "ALERT") ? "card status-danger" : "card";

        updateBtnStyle('fan', data.fan);
        updateBtnStyle('light', data.light);
    });

    function toggleDevice(device) {
        const ref = database.ref('lab_sensors/' + device);
        ref.once('value').then(s => ref.set(s.val() === "ON" ? "OFF" : "ON"));
    }

    function updateBtnStyle(device, state) {
        const btn = document.getElementById(device + '-btn');
        state === "ON" ? btn.classList.add('active-' + device) : btn.classList.remove('active-' + device);
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
